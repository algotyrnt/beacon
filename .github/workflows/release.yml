name: release

on:
    push:
        branches: ["main"]

jobs:
    bump-and-release:
        if: "!contains(github.event.head_commit.message, '[skip ci]')"
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Calculate Next Version
              id: versioning
              run: |
                  # Get latest tag, default to v1.0
                  LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0")
                  VERSION_ONLY=${LATEST_TAG#v}
                  IFS='.' read -r major minor <<< "$VERSION_ONLY"

                  NEW_MINOR=$((minor + 1))
                  NEW_TAG="v$major.$NEW_MINOR"
                  NEW_VERSION="$major.$NEW_MINOR"

                  echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
                  echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

                  # Only update displayVersion; leaves bundleVersion untouched
                  sed -i "s/displayVersion: \".*\"/displayVersion: \"$NEW_VERSION\"/" Beacon.swiftpm/Package.swift

            - name: Commit Updated Package.swift
              run: |
                  git config --global user.name "github-actions[bot]"
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"
                  git add Beacon.swiftpm/Package.swift
                  git commit -m "chore: bump display version to ${{ steps.versioning.outputs.version }} [skip ci]"
                  git push

            - name: Package for Release
              run: |
                  zip -r Beacon-App.zip Beacon.swiftpm

            - name: Generate Checksum
              id: checksum
              run: |
                  sha256sum Beacon-App.zip > Beacon-App.zip.sha256
                  echo "hash=$(cat Beacon-App.zip.sha256 | awk '{print $1}')" >> $GITHUB_OUTPUT

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.versioning.outputs.tag }}
                  files: |
                      Beacon-App.zip
                      Beacon-App.zip.sha256
                  name: "Release ${{ steps.versioning.outputs.tag }}"
                  body: |
                      ## Version ${{ steps.versioning.outputs.tag }}

                      ### Security Verification
                      - **Checksum:** `${{ steps.checksum.outputs.hash }}`
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
