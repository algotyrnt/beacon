name: Release on Tag

on:
    push:
        tags:
            - "v*"

jobs:
    create-release:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4

            - name: Package for Release
              run: |
                  zip -r Beacon-App.zip Beacon.swiftpm

            - name: Generate Checksum
              id: checksum
              run: |
                  sha256sum Beacon-App.zip > Beacon-App.zip.sha256
                  echo "hash=$(cat Beacon-App.zip.sha256 | awk '{print $1}')" >> $GITHUB_OUTPUT

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      Beacon-App.zip
                      Beacon-App.zip.sha256
                  name: "Release ${{ github.ref_name }}"
                  body: |
                      ## Version ${{ github.ref_name }}

                      This release contains the packaged `.swiftpm` project for version **${{ github.ref_name }}**.

                      ### Security Verification
                      Verify the integrity of the download using the SHA256 hash below:
                      - **Checksum:** `${{ steps.checksum.outputs.hash }}`

                      ---
                      *Automated release generated by GitHub Actions.*
                  draft: false
                  prerelease: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
